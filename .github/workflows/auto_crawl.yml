name: Auto Crawl Lotto 539

on:
  schedule:
    # Runs every day at 21:30 Asia/Taipei (13:30 UTC).
    - cron: "30 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Crawl latest history
        run: python fetch_lotto539_history.py --db lotto-539.db

      - name: Commit database updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lotto-539.db
          if git diff --cached --quiet; then
            echo "No database changes to commit."
          else
            git commit -m "chore: auto update lotto 539 database"
            git push
          fi
